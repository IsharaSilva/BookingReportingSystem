<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Isolated Document Export Utility</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f3f4f6;
            margin: 0;
            padding: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .export-container {
            background-color: #ffffff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            text-align: center;
            max-width: 400px;
            border-top: 5px solid #217346;
        }
        h2 {
            color: #1f2937;
            margin-top: 0;
        }
        p {
            color: #4b5563;
            font-size: 14px;
            line-height: 1.5;
            margin-bottom: 30px;
        }
        .btn-download {
            background-color: #217346;
            color: #ffffff;
            font-size: 16px;
            font-weight: 600;
            text-decoration: none;
            padding: 14px 28px;
            border-radius: 6px;
            display: inline-block;
            transition: all 0.2s ease-in-out;
            box-shadow: 0 4px 6px rgba(33, 115, 70, 0.2);
        }
        .btn-download:hover {
            background-color: #1a5c38;
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(33, 115, 70, 0.3);
        }
        .btn-download:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>

<div class="export-container">
    <h2>Data Export Sandbox</h2>
    <p>This page connects directly to your Spring Boot Excel controller. Clicking the button will stream all 1,000 raw ledger rows from the database into a cleanly formatted workbook.</p>

<!--    <a href="http://localhost:8080/api/excel/download" class="btn-download">-->
<!--        📊 Download Full Excel Ledger-->
<!--    </a>-->
</div>

</body>
</html>
