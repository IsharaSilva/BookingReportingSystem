<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking Analytics Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-100 pb-12 font-sans">

<div class="container mx-auto p-6 max-w-7xl">

    <header class="mb-10 text-center bg-amber-50/60 text-slate-800 rounded-3xl p-8 shadow-sm border border-slate-200">
        <div class="mb-6">
            <h1 class="text-3xl sm:text-4xl font-black tracking-tight mt-3 text-emerald-600">
                Booking Reporting System
            </h1>
            <p class="text-slate-500 text-sm mt-1.5 font-medium">Real-time analytical and financial booking logs.</p>
        </div>

        <div class="flex items-center justify-center gap-4 max-w-md mx-auto">
            <a href="http://localhost:8080/api/excel/download"
               class="w-full bg-emerald-600 hover:bg-emerald-500 active:bg-emerald-700 text-white font-bold py-3.5 px-6 rounded-2xl text-xs flex items-center justify-center gap-2 transition shadow-lg shadow-emerald-600/10 cursor-pointer">
                <span>📊</span> Export Excel
            </a>
        </div>
    </header>

    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 mb-10" id="kpi-grid"></div>

    <div id="charts-grid" class="grid grid-cols-1 lg:grid-cols-2 gap-8"></div>
</div>

<script>
    const API_BASE = 'http://localhost:8080/api/dashboard';

    // KPI Configs
    const kpiConfigs = [
        { id: 'kpi-total', title: 'Total Bookings', themeClass: 'bg-slate-50 border-slate-200 text-slate-800', info: 'Total raw records.' },
        { id: 'kpi-confirmed', title: 'Confirmed', themeClass: 'bg-slate-50 border-emerald-200 text-emerald-800', info: 'Successfully finalized transactions.' },
        { id: 'kpi-cancelled', title: 'Cancelled', themeClass: 'bg-slate-50 border-rose-200 text-rose-800', info: 'customer cancellations.' },
        { id: 'kpi-revenue', title: 'Gross Revenue', themeClass: 'bg-slate-50 border-blue-200 text-blue-800', info: 'Total revenue.' }
    ];

    // Chart Configs
    const chartConfigs = [
        { id: 'chart-monthly-revenue', title: 'Monthly Revenue Trend', info: 'Monthly progression curve.' },
        { id: 'chart-booking-status', title: 'Booking Status Distribution', info: 'Status breakdown.' },
        { id: 'chart-revenue-country', title: 'Revenue by Country', info: 'Contributions by destination.' },
        { id: 'chart-top-agents', title: 'Top 5 Performing Agents', info: 'Top agents ranked by bookings.' }
    ];

    // Render HTML KPIs
    document.getElementById('kpi-grid').innerHTML = kpiConfigs.map(kpi => `
        <div class="${kpi.themeClass} p-6 rounded-2xl border shadow-sm relative overflow-hidden flex flex-col justify-between min-w-0">
            <div class="flex justify-between items-start gap-2">
                <p class="text-xs font-bold uppercase tracking-wider truncate">${kpi.title}</p>
                <span class="text-slate-400 hover:text-slate-600 cursor-help text-xs shrink-0" title="${kpi.info}">ℹ️</span>
            </div>
            <h3 class="text-3xl font-black mt-4 truncate" id="${kpi.id}">0</h3>
        </div>
    `).join('');

    // Render HTML Chart Cards
    document.getElementById('charts-grid').innerHTML = chartConfigs.map(cfg => `
        <div class="bg-slate-50 p-6 rounded-2xl border border-slate-200 shadow-sm">
            <div class="flex justify-between items-center mb-4 pb-2 border-b border-slate-200">
                <h2 class="text-base font-extrabold text-slate-800">${cfg.title}</h2>
                <span class="text-slate-400 hover:text-slate-600 cursor-help text-xs" title="${cfg.info}">ℹ️</span>
            </div>
            <div class="h-64 relative flex justify-center">
                <canvas id="${cfg.id}"></canvas>
            </div>
        </div>
    `).join('');

    // Fetch helper
    async function getData(endpoint) {
        const response = await fetch(`${API_BASE}${endpoint}`);
        if (!response.ok) throw new Error(`Failed to load: ${endpoint}`);
        return await response.json();
    }

    // Initialize Dashboard Charts & Data bindings
    async function initializeDashboard() {
        try {
            const [summary, countryData, agentData, monthlyData] = await Promise.all([
                getData('/summary'),
                getData('/revenue-country'),
                getData('/agent-bookings'),
                getData('/monthly-revenue')
            ]);

            // Update KPI Metrics
            document.getElementById('kpi-total').textContent = summary.totalBookings.toLocaleString();
            document.getElementById('kpi-confirmed').textContent = summary.confirmed.toLocaleString();
            document.getElementById('kpi-cancelled').textContent = summary.cancelled.toLocaleString();
            document.getElementById('kpi-revenue').textContent = '$' + summary.totalRevenue.toLocaleString(undefined, {
                minimumFractionDigits: 2, maxFractionDigits: 2
            });

            // Set Chart Defaults
            Chart.defaults.font.family = "system-ui, -apple-system, sans-serif";
            Chart.defaults.color = "#475569"; // Slate gray label text

            // 1. Monthly Revenue Chart (Line)
            new Chart(document.getElementById('chart-monthly-revenue'), {
                type: 'line',
                data: {
                    labels: monthlyData.map(item => item.month),
                    datasets: [{
                        label: 'Revenue ($)',
                        data: monthlyData.map(item => item.revenue),
                        borderColor: '#10b981',
                        tension: 0.35,
                        fill: true,
                        backgroundColor: 'rgba(16, 185, 129, 0.05)'
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });

            // 2. Booking Status Chart (Doughnut / Pie)
            new Chart(document.getElementById('chart-booking-status'), {
                type: 'doughnut',
                data: {
                    labels: ['Confirmed', 'Cancelled', 'Pending'],
                    datasets: [{
                        data: [summary.confirmed, summary.cancelled, Math.max(0, summary.totalBookings - (summary.confirmed + summary.cancelled))],
                        backgroundColor: ['#10b981', '#f43f5e', '#3b82f6'],
                        borderWidth: 4,
                        borderColor: '#f8fafc'
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });

            // 3. Country Revenue Chart (Bar)
            new Chart(document.getElementById('chart-revenue-country'), {
                type: 'bar',
                data: {
                    labels: countryData.map(item => item.country),
                    datasets: [{ label: 'Revenue ($)', data: countryData.map(item => item.revenue), backgroundColor: '#10b981', borderRadius: 6 }]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });

            // 4. Top 5 Agents Chart (Horizontal Bar)
            new Chart(document.getElementById('chart-top-agents'), {
                type: 'bar',
                data: {
                    labels: agentData.slice(0, 5).map(item => item.agent),
                    datasets: [{ label: 'Bookings Count', data: agentData.slice(0, 5).map(item => item.bookingsCount), backgroundColor: '#8b5cf6', borderRadius: 6 }]
                },
                options: { indexAxis: 'y', responsive: true, maintainAspectRatio: false }
            });

        } catch (e) {
            console.error("Dashboard error during initialization:", e);
        }
    }

    document.addEventListener('DOMContentLoaded', initializeDashboard);
</script>
</body>
</html>
