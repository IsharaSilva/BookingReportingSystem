<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking Analytics Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-100 pb-12 font-sans">

<div class="container mx-auto p-6">
    <header class="mb-8 border-b border-gray-200 pb-5 flex justify-between items-start">
        <div>
            <h1 class="text-3xl font-bold text-gray-800">Booking Analytics</h1>
            <p class="text-gray-600">Real-time booking and financial metrics dashboard.</p>
        </div>

        <a href="http://localhost:8080/api/excel/download"
           class="bg-emerald-700 hover:bg-emerald-800 text-white font-semibold py-2.5 px-5 rounded-lg shadow-md transition duration-200 text-sm flex items-center gap-2 whitespace-nowrap">
            <span>📊</span> Excel Report Generate
        </a>
    </header>

    <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
        <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
            <p class="text-xs font-bold uppercase text-gray-400 mb-1">Total Bookings</p>
            <h3 class="text-3xl font-bold text-gray-800" id="kpi-total">0</h3>
        </div>
        <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
            <p class="text-xs font-bold uppercase text-green-600 mb-1">Confirmed</p>
            <h3 class="text-3xl font-bold text-gray-800" id="kpi-confirmed">0</h3>
        </div>
        <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
            <p class="text-xs font-bold uppercase text-red-500 mb-1">Cancelled</p>
            <h3 class="text-3xl font-bold text-gray-800" id="kpi-cancelled">0</h3>
        </div>
        <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
            <p class="text-xs font-bold uppercase text-blue-600 mb-1">Gross Revenue</p>
            <h3 class="text-3xl font-bold text-gray-800" id="kpi-revenue">$0.00</h3>
        </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-12">
        <div class="bg-white p-6 rounded-xl border border-gray-200">
            <h2 class="text-lg font-semibold text-gray-800 mb-4">Monthly Revenue Trend</h2>
            <div class="h-64 relative"><canvas id="chart-monthly-revenue"></canvas></div>
        </div>

        <div class="bg-white p-6 rounded-xl border border-gray-200">
            <h2 class="text-lg font-semibold text-gray-800 mb-4">Booking Status Distribution</h2>
            <div class="h-64 relative flex justify-center"><canvas id="chart-booking-status"></canvas></div>
        </div>

        <div class="bg-white p-6 rounded-xl border border-gray-200">
            <h2 class="text-lg font-semibold text-gray-800 mb-4">Revenue by Country</h2>
            <div class="h-64 relative"><canvas id="chart-revenue-country"></canvas></div>
        </div>

        <div class="bg-white p-6 rounded-xl border border-gray-200">
            <h2 class="text-lg font-semibold text-gray-800 mb-4">Top 5 Performing Agents</h2>
            <div class="h-64 relative"><canvas id="chart-top-agents"></canvas></div>
        </div>
    </div>
</div>

<script>
    const API_BASE = 'http://localhost:8080/api/dashboard';

    // handle API HTTP requests
    async function getData(endpoint) {
        const response = await fetch(`${API_BASE}${endpoint}`);
        if (!response.ok) {
            throw new Error(`Failed to load: ${endpoint}`);
        }
        return await response.json();
    }

    async function initializeDashboard() {
        try {
            // Fetch and update the KPI text values
            const summary = await getData('/summary');

            document.getElementById('kpi-total').textContent = summary.totalBookings.toLocaleString();
            document.getElementById('kpi-confirmed').textContent = summary.confirmed.toLocaleString();
            document.getElementById('kpi-cancelled').textContent = summary.cancelled.toLocaleString();
            document.getElementById('kpi-revenue').textContent = '$' + summary.totalRevenue.toLocaleString(undefined, {
                minimumFractionDigits: 2,
                maximumFractionDigits: 2
            });

            // Render "Booking Status" Pie Chart
            new Chart(document.getElementById('chart-booking-status'), {
                type: 'pie',
                data: {
                    labels: ['Confirmed', 'Cancelled', 'Pending/Other'],
                    datasets: [{
                        data: [
                            summary.confirmed,
                            summary.cancelled,
                            Math.max(0, summary.totalBookings - (summary.confirmed + summary.cancelled))
                        ],
                        backgroundColor: ['#10b981', '#ef4444', '#3b82f6']
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });

            // Fetch and Render "Revenue by Country" Bar Chart
            const countryData = await getData('/revenue-country');
            new Chart(document.getElementById('chart-revenue-country'), {
                type: 'bar',
                data: {
                    labels: countryData.map(item => item.country),
                    datasets: [{
                        label: 'Revenue ($)',
                        data: countryData.map(item => item.revenue),
                        backgroundColor: '#10b981'
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });

            // Fetch and Render "Top Agents" Horizontal Bar Chart
            const agentData = await getData('/agent-bookings');
            const top5Agents = agentData.slice(0, 5);
            new Chart(document.getElementById('chart-top-agents'), {
                type: 'bar',
                data: {
                    labels: top5Agents.map(item => item.agent),
                    datasets: [{
                        label: 'Bookings Count',
                        data: top5Agents.map(item => item.bookingsCount),
                        backgroundColor: '#8b5cf6'
                    }]
                },
                options: {
                    indexAxis: 'y',
                    responsive: true,
                    maintainAspectRatio: false
                }
            });

            // Fetch and Render "Monthly Revenue" Line Chart
            const monthlyData = await getData('/monthly-revenue');
            new Chart(document.getElementById('chart-monthly-revenue'), {
                type: 'line',
                data: {
                    labels: monthlyData.map(item => item.month),
                    datasets: [{
                        label: 'Revenue Trend ($)',
                        data: monthlyData.map(item => item.revenue),
                        borderColor: '#3b82f6',
                        backgroundColor: 'rgba(59, 130, 246, 0.1)',
                        fill: true,
                        tension: 0.2
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });

        } catch (error) {
            console.error("Dashboard error:", error);
        }
    }

    // Start loading data as soon as the page structure is ready
    document.addEventListener('DOMContentLoaded', initializeDashboard);
</script>
</body>
</html>
