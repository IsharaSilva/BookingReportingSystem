spring.application.name=booking-reportng-system

spring.datasource.url=jdbc:mysql://localhost:3306/booking_system_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate Automation Properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

#Proper logging
# System Output Logging Patterns
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# Ensure info and warn statements display explicitly for your packages
logging.level.com.example.booking_reportng_system=INFO

# Optional: View real-time SQL execution states alongside logic evaluations
logging.level.org.hibernate.SQL=DEBUG

# Set root log level to INFO to keep third-party library logs clean (avoids flooding the console)
logging.level.root=INFO

#mailtrap
