name: Java CI with Maven and MySQL

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: booking_system_db
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        # Robust health check to block steps until MySQL is healthy
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # A short pause to guarantee MySQL is fully listening on port 3306
      - name: Wait for MySQL to boot
        run: sleep 10

      - name: Build with Maven
        run: mvn -B clean package
        env:
          SPRING_DATASOURCE_URL: jdbc:mysql://127.0.0.1:3306/booking_system_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
          SPRING_DATASOURCE_USERNAME: root
          SPRING_DATASOURCE_PASSWORD: root