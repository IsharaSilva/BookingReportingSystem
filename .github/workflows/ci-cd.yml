name: Java CI with Maven and MySQL

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    # Spin up a MySQL service container
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: booking_system_test
          MYSQL_ROOT_PASSWORD: root_password
        ports:
          - 3306:3306
        # Wait until MySQL is healthy and ready to receive connections
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn -B clean package
        env:
          SPRING_DATASOURCE_URL: jdbc:mysql://localhost:3306/booking_system_test?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
          SPRING_DATASOURCE_USERNAME: root
          SPRING_DATASOURCE_PASSWORD: root